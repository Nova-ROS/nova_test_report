<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tests - ROS2 Jazzy</title>
<style>
  :root { --bg: #0f0f1a; --card: #1a1a2e; --accent: #4fc3f7; --text: #e0e0e0; --muted: #888; --success: #4caf50; --danger: #f44336; --warning: #ff9800; --skip: #9e9e9e; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  nav { background: #1a1a2e; display: flex; align-items: center; padding: 0 24px; height: 48px; border-bottom: 1px solid rgba(255,255,255,0.06); position: sticky; top: 0; z-index: 100; }
  nav .brand { font-weight: 700; font-size: 16px; margin-right: 32px; color: var(--accent); text-decoration: none; }
  nav a { color: var(--muted); text-decoration: none; padding: 12px 20px; font-size: 14px; font-weight: 500; border-bottom: 3px solid transparent; transition: all 0.2s; }
  nav a:hover { color: var(--text); }
  nav a.active { color: var(--accent); border-bottom-color: var(--accent); }
  .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
  h1 { font-size: 24px; margin-bottom: 24px; }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .summary-card { background: var(--card); border-radius: 8px; padding: 20px; text-align: center; }
  .summary-card .number { font-size: 32px; font-weight: 700; }
  .summary-card .label { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .total .number { color: var(--accent); }
  .passed .number { color: var(--success); }
  .failed .number { color: var(--danger); }
  .skipped .number { color: var(--skip); }
  .broken .number { color: var(--warning); }
  .bar-container { background: var(--card); border-radius: 8px; padding: 20px; margin-bottom: 24px; }
  .bar { display: flex; height: 24px; border-radius: 4px; overflow: hidden; }
  .bar div { transition: width 0.3s; }
  .bar-legend { display: flex; gap: 20px; margin-top: 12px; font-size: 13px; flex-wrap: wrap; }
  .bar-legend span { display: flex; align-items: center; gap: 6px; }
  .bar-legend .dot { width: 10px; height: 10px; border-radius: 2px; }
  .note { color: var(--muted); font-size: 13px; margin-top: 32px; line-height: 1.6; }
</style>
</head>
<body>
<nav>
  <a class="brand" href="index.html">ROS2 Jazzy</a>
  <a href="index.html">Home</a>
  <a href="tests.html" class="active">Tests</a>
  <a href="overview.html">Overview</a>
  <a href="benchmarks.html">Benchmarks</a>
</nav>
<div class="container">
  <h1>Test Results Summary</h1>
  <div class="summary-grid" id="summary"></div>
  <div class="bar-container">
    <div class="bar" id="bar"></div>
    <div class="bar-legend">
      <span><span class="dot" style="background:var(--success)"></span>Passed</span>
      <span><span class="dot" style="background:var(--danger)"></span>Failed</span>
      <span><span class="dot" style="background:var(--warning)"></span>Broken</span>
      <span><span class="dot" style="background:var(--skip)"></span>Skipped</span>
    </div>
  </div>
  <p class="note">This page shows a summary of all test results. For detailed test case information, run <code>./report.sh --collect-only</code> locally to generate the full Allure report.</p>
</div>
<script>
async function loadSummary() {
  try {
    const resp = await fetch('summary.json');
    const data = await resp.json();
    const s = data.stats || {};
    const total = s.total || 0;
    const passed = s.passed || 0;
    const failed = s.failed || 0;
    const broken = s.broken || 0;
    const skipped = s.skipped || 0;
    const retries = s.retries || 0;

    document.getElementById('summary').innerHTML = `
      <div class="summary-card total"><div class="number">${total}</div><div class="label">Total</div></div>
      <div class="summary-card passed"><div class="number">${passed}</div><div class="label">Passed</div></div>
      <div class="summary-card failed"><div class="number">${failed}</div><div class="label">Failed</div></div>
      <div class="summary-card broken"><div class="number">${broken}</div><div class="label">Broken</div></div>
      <div class="summary-card skipped"><div class="number">${skipped}</div><div class="label">Skipped</div></div>
    `;

    if (total > 0) {
      const pPct = (passed/total*100).toFixed(1);
      const fPct = (failed/total*100).toFixed(1);
      const bPct = (broken/total*100).toFixed(1);
      const sPct = (skipped/total*100).toFixed(1);
      document.getElementById('bar').innerHTML = `
        <div style="width:${pPct}%;background:var(--success)"></div>
        <div style="width:${fPct}%;background:var(--danger)"></div>
        <div style="width:${bPct}%;background:var(--warning)"></div>
        <div style="width:${sPct}%;background:var(--skip)"></div>
      `;
    }
  } catch(e) {
    document.getElementById('summary').innerHTML = '<p>Failed to load summary data</p>';
  }
}
loadSummary();
</script>
</body>
</html>
